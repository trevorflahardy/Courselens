name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" aiosqlite "pydantic>=2.10" \
            pydantic-settings networkx pypdf python-docx beautifulsoup4 \
            fastmcp python-multipart pytest pytest-asyncio ruff mypy httpx

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Lint Python (ruff)
        run: ruff check backend/ scripts/ mcp/ tests/

      - name: Lint Frontend (eslint)
        run: cd frontend && npm run lint

      - name: Setup database
        run: python scripts/setup_db.py

      - name: Seed demo data
        run: python scripts/seed_demo.py

      - name: Test Python (pytest)
        run: pytest tests/ -v --tb=short

      - name: Build frontend
        run: cd frontend && npm run build
